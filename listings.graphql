extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.11", import: ["@key"])
  @link(
    url: "https://specs.apollo.dev/connect/v0.2"
    import: ["@connect", "@source"]
  )
  @source(
    name: "listings"
    http: { baseURL: "https://airlock-listings.demo-api.apollo.dev" }
  )
  @source(
    name: "activities"
    http: { baseURL: "https://activities-rest-api-0d717e1922e0.herokuapp.com" }
  )

type Query {
  "A curated array of listings to feature on the homepage"
  featuredListings: [Listing!]!
    @connect(
      source: "listings"
      http: { GET: "/featured-listings" }
      selection: """
      id
      title
      numOfBeds
      costPerNight
      closed: closedForBookings
      """
    )

  # EXERCISE: LISTING DETAILS
  "A specific listing"
  listing(id: ID!): Listing
    @connect(
      source: "listings"
      http: { GET: "/listings/{$args.id}" }
      selection: """
      id
      title
      numOfBeds
      costPerNight
      closed: closedForBookings
      """
      entity: true
    )
}

"A particular intergalactic location available for booking"
type Listing @key(fields: "id") {
  id: ID!
  "The listing's title"
  title: String!
  "The number of beds available"
  numOfBeds: Int
  "The cost per night"
  costPerNight: Float
  "Indicates whether listing is closed for bookings (on hiatus)"
  closed: Boolean
  # EXERCISE: LISTING ACTIVITIES
  "The activities available for this listing"
  activities: [Activity!]!
    @connect(
      source: "activities"
      http: { GET: "/location/{$this.id}/activities" }
      selection: """
      id
      name
      description
      terrain
      groupSize
      """
    )
}

# EXERCISE: LISTING ACTIVITIES
type Activity {
  id: ID!
  name: String!
  description: String
  terrain: String
  groupSize: Int
}
